name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 1. Voorcontrole ───────────────────────────────────────
  # Faalt snel, voordat er bouwtijd op drie platformen verbruikt wordt.
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-
      - run: npm ci
      - run: npm run build

  # ── 2. Installers bouwen ──────────────────────────────────
  build:
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            label: Windows
          - platform: macos-latest
            rust-target: universal-apple-darwin
            label: macOS
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            label: Linux

    name: Build – ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets (Windows/Linux)
        if: runner.os != 'macOS'
        run: rustup target add ${{ matrix.rust-target }}

      - name: Add Rust targets (macOS universal)
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libxdo-dev \
            patchelf \
            fuse

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.rust-target }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: open-3d-studio-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
          if-no-files-found: ignore
          retention-days: 14

  # ── 3. Concept-release publiceren ─────────────────────────
  # Levert een DRAFT op, zodat de beheerder de notities kan nalopen
  # voordat de release openbaar wordt. Alleen bij een tagpush.
  publish:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Collect installer files
        run: |
          mkdir -p release
          find artifacts -name '*-setup.exe' -exec cp {} release/ \;
          find artifacts -name '*.dmg' -exec cp {} release/ \;
          find artifacts -name '*.AppImage' -exec cp {} release/ \;
          find artifacts -name '*.deb' -exec cp {} release/ \;
          ls -la release/

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Open 3D Studio ${{ github.ref_name }}
          prerelease: false
          draft: true
          generate_release_notes: true
          body: |
            **Downloads:**
            - **Windows:** `.exe` (NSIS-installer)
            - **macOS:** `.dmg` (universal)
            - **Linux:** `.AppImage` / `.deb`
          files: release/*
